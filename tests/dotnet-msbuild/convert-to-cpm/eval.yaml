scenarios:
  - name: "Convert single project to CPM"
    prompt: "Convert my project at simple-single-project/MyApp/MyApp.csproj to use Central Package Management."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Directory.Packages.props"
      - type: "output_contains"
        value: "ManagePackageVersionsCentrally"
      - type: "output_contains"
        value: "PackageVersion"
    rubric:
      - "Created a Directory.Packages.props file with ManagePackageVersionsCentrally set to true"
      - "Listed all three packages (Microsoft.Extensions.Logging, Polly, System.Text.Json) as PackageVersion items"
      - "Removed Version attributes from PackageReference items in the .csproj"
      - "Ran dotnet restore and dotnet build to validate the conversion"
    timeout: 120

  - name: "Convert multi-project solution to CPM"
    prompt: "I'd like to convert simple-solution/MyApp.sln to Central Package Management."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Directory.Packages.props"
      - type: "output_contains"
        value: "ManagePackageVersionsCentrally"
      - type: "output_matches"
        pattern: "PrivateAssets"
    rubric:
      - "Enumerated projects in the solution (Web, Core, Tests)"
      - "Created Directory.Packages.props at the solution root with ManagePackageVersionsCentrally set to true"
      - "Listed all 6 unique packages as PackageVersion items"
      - "Removed Version attributes from all three project files"
      - "Preserved PrivateAssets attribute on xunit.runner.visualstudio"
      - "Ran dotnet restore and dotnet build to validate the conversion"
    timeout: 120

  - name: "Decline CPM conversion for packages.config project"
    prompt: "Convert my simple-packages-config/LegacyApp project to Central Package Management."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "packages.config"
      - type: "output_contains"
        value: "PackageReference"
      - type: "file_not_exists"
        path: "simple-packages-config/Directory.Packages.props"
    rubric:
      - "Detected the project uses packages.config instead of PackageReference format"
      - "Informed the user that CPM requires PackageReference and cannot be applied to packages.config projects"
      - "Suggested migrating from packages.config to PackageReference first"
      - "Did not attempt to create Directory.Packages.props or modify any project files"
    timeout: 120

  - name: "Convert solution with MSBuild property versions to CPM"
    prompt: "Convert moderate-msbuild-properties/Platform.sln to Central Package Management. The package versions are currently defined as MSBuild properties in Directory.Build.props."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Directory.Packages.props"
      - type: "output_matches"
        pattern: "(OTelVersion|DIVersion)"
      - type: "output_matches"
        pattern: "OutputPath"
    rubric:
      - "Traced each MSBuild property (OTelVersion, DIVersion) to its definition in Directory.Build.props"
      - "Clearly showed which packages use properties vs literal versions"
      - "Asked the user whether to inline the resolved values or keep the property references"
      - "Created Directory.Packages.props with the user's chosen approach"
      - "Removed only the version-related properties from Directory.Build.props, preserving the OutputPath property"
      - "Verified no remaining references to removed properties exist"
      - "Ran dotnet restore and dotnet build to validate the conversion"
    timeout: 180

  - name: "Convert solution with version conflicts to CPM"
    prompt: "Convert moderate-version-conflicts/Inventory.slnx to Central Package Management."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Directory.Packages.props"
      - type: "output_matches"
        pattern: "(conflict|mismatch|different version)"
      - type: "output_matches"
        pattern: "System\\.Text\\.Json"
      - type: "output_matches"
        pattern: "Azure\\.Identity"
    rubric:
      - "Audited all 4 projects and identified both version conflicts (System.Text.Json and Azure.Identity)"
      - "Presented the System.Text.Json conflict clearly: 10.0.1 in Api/Shared/Tests vs 8.0.4 in Worker"
      - "Presented the Azure.Identity conflict: 1.13.2 in Api vs 1.10.0 in Shared"
      - "Asked the user how to resolve each conflict rather than silently picking a version"
      - "Offered options such as aligning to the highest version or using VersionOverride"
      - "Created Directory.Packages.props reflecting the user's chosen resolution strategy"
      - "Ran dotnet restore and dotnet build to validate the conversion"
    timeout: 180

  - name: "Convert complex repository with multiple CPM challenges"
    prompt: "I need to convert this entire repository to Central Package Management. The solution is at advanced-multi-complexity/Enterprise.slnx. There are some complications: package versions defined as MSBuild properties, conditional package references for multi-targeting, and a shared Common.props that adds a package to all projects."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Directory.Packages.props"
      - type: "output_matches"
        pattern: "System\\.Text\\.Json"
      - type: "output_matches"
        pattern: "(BlobsVersion|HostingVersion)"
      - type: "output_matches"
        pattern: "(condition|conditional|TargetFramework)"
      - type: "output_matches"
        pattern: "Common\\.props"
    rubric:
      - "Performed a thorough audit across all 5 projects plus Common.props and Directory.Build.props"
      - "Identified the three-way System.Text.Json version conflict (10.0.1, 9.0.0, 8.0.4) including the security advisory on 8.0.4"
      - "Identified the Azure.Storage.Blobs version mismatch between the BlobsVersion property and the literal in Legacy"
      - "Traced MSBuild properties (BlobsVersion, HostingVersion) to their definitions in Directory.Build.props"
      - "Identified the conditional PackageReference for Microsoft.AspNetCore.Mvc.NewtonsoftJson with different versions per TFM"
      - "Identified the PackageReference in Common.props that applies to all projects"
      - "Asked the user about each decision point separately rather than making silent choices"
      - "Created Directory.Packages.props reflecting all user decisions"
      - "Preserved non-version properties (LangVersion, ImplicitUsings) in Directory.Build.props"
      - "Ran dotnet restore and dotnet build to validate the conversion"
    timeout: 180
